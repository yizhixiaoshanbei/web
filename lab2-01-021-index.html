<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>图书商城</title>
<link rel="stylesheet" href="css/lab2-01-021-index.css">
</head>
<body>
<header class="header">
  <div class="logo">
    <img src="img/logo.jpg" alt="Logo">
  </div>
  <ul class="nav">
    <li>首页</li>
    <li>图书分类</li>
    <li>热门推荐</li>
    <li>新书上市</li>
    <li>关于我们</li>
  </ul>
</header>
<div class="container clearfix">
  <aside class="left">
    <h2>图书分类</h2>
    <ul class="category">
      <li>计算机</li>
      <li>文学小说</li>
      <li>历史传记</li>
      <li>少儿读物</li>
      <li>考试教材</li>
    </ul>
  </aside>
  <section class="middle">
    <h2>图书展示</h2>
    <div class="book-show">
      <div class="book-item relative-box">
        <img src="img/book1.jpg" alt="图书封面">
        <span class="hot-tag">热销</span>
        <div class="show-info">点击查看详情</div>
      </div>
    </div>
    <h2>热门推荐（浮动）</h2>
    <div class="hot-books clearfix">
      <div class="book">
        <img src="img/book2.jpg" alt="图书">
        <p>图书1</p>
      </div>
      <div class="book">
        <img src="img/book3.jpg" alt="图书">
        <p>图书2</p>
      </div>
      <div class="book">
        <img src="img/book5.jpg" alt="图书">
        <p>图书3</p>
      </div>
      <div class="book">
        <img src="img/book4.jpg" alt="图书">
        <p>图书4</p>
      </div>
    </div>
    <h2>新书上市（表格）</h2>
    <table class="new-book-table">
      <tr>
        <th>书名</th>
        <th>作者</th>
        <th>价格</th>
      </tr>
      <tr>
        <td>人间失格</td>
        <td>太宰治</td>
        <td>29元</td>
      </tr>
      <tr>
        <td>我与地坛</td>
        <td>史铁生</td>
        <td>39元</td>
      </tr>
    </table>
  </section>
  <aside class="right">
    <h3>促销广告</h3>
    <p>满100减20</p>
    <p>新用户立减10元</p>
  </aside>
</div>
</body>
</html>
